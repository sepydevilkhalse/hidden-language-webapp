<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>زبان مخفی</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Noto Nastaliq Urdu', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
        }
        body {
            min-height: 100vh;
            background: #0b0b1e;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(139,92,246,0.1) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(99,102,241,0.08) 0%, transparent 50%), radial-gradient(ellipse at 50% 80%, rgba(236,72,153,0.05) 0%, transparent 50%);
            animation: bgPulse 6s ease-in-out infinite alternate;
            z-index: 0;
        }
        @keyframes bgPulse {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(180,130,255,0.2);
            animation: floatUp linear infinite;
            box-shadow: 0 0 15px rgba(180,130,255,0.1);
        }
        .particle:nth-child(1) { width: 6px; height: 6px; left: 8%; animation-duration: 18s; animation-delay: 0s; }
        .particle:nth-child(2) { width: 4px; height: 4px; left: 18%; animation-duration: 14s; animation-delay: 2s; }
        .particle:nth-child(3) { width: 8px; height: 8px; left: 30%; animation-duration: 22s; animation-delay: 4s; }
        .particle:nth-child(4) { width: 5px; height: 5px; left: 45%; animation-duration: 16s; animation-delay: 1s; }
        .particle:nth-child(5) { width: 7px; height: 7px; left: 58%; animation-duration: 20s; animation-delay: 3s; }
        .particle:nth-child(6) { width: 4px; height: 4px; left: 70%; animation-duration: 13s; animation-delay: 5s; }
        .particle:nth-child(7) { width: 9px; height: 9px; left: 82%; animation-duration: 24s; animation-delay: 2s; }
        .particle:nth-child(8) { width: 5px; height: 5px; left: 92%; animation-duration: 17s; animation-delay: 6s; }
        .particle:nth-child(9) { width: 6px; height: 6px; left: 25%; animation-duration: 19s; animation-delay: 7s; }
        .particle:nth-child(10) { width: 4px; height: 4px; left: 65%; animation-duration: 15s; animation-delay: 4s; }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        .container {
            width: 100%;
            max-width: 540px;
            position: relative;
            z-index: 1;
            animation: containerIn 0.8s ease-out;
        }
        @keyframes containerIn {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .glass-card {
            background: rgba(18,16,40,0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 40px;
            padding: 28px 22px 24px;
            border: 1px solid rgba(200,160,255,0.12);
            box-shadow: 0 20px 70px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            animation: cardIn 0.6s ease-out;
        }
        .glass-card:hover {
            border-color: rgba(200,160,255,0.2);
            box-shadow: 0 25px 80px rgba(0,0,0,0.7), 0 0 60px rgba(180,130,255,0.04);
            transform: translateY(-2px);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 18px;
            margin-bottom: 18px;
            border-bottom: 1px solid rgba(200,160,255,0.06);
        }
        .logo-text {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            animation: titleGlow 3s ease-in-out infinite;
        }
        @keyframes titleGlow {
            0%,100% { text-shadow: 0 0 2px rgba(255,255,255,0.2); }
            50% { text-shadow: 0 0 15px rgba(180,130,255,0.3); }
        }
        .logo-text span { color: #c4b5fd; }
        .title-section { text-align: center; margin-bottom: 22px; }
        .title-section h1 { color: #fff; font-size: 26px; font-weight: 700; animation: fadeIn 0.5s ease-out; }
        .title-section .sub { color: #a78bfa; font-size: 14px; margin-top: 4px; animation: fadeIn 0.7s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-label {
            color: #b0a0d0;
            font-size: 14px;
            margin-bottom: 8px;
            animation: fadeIn 0.8s ease-out;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            background: rgba(10,8,28,0.6);
            border: 1px solid rgba(180,130,255,0.12);
            border-radius: 24px;
            color: #f0ecff;
            font-size: 16px;
            padding: 14px 18px;
            resize: none;
            outline: none;
            line-height: 1.8;
            direction: rtl;
            transition: all 0.3s ease;
            animation: fadeIn 0.9s ease-out;
        }
        textarea:focus {
            border-color: rgba(180,130,255,0.3);
            background: rgba(10,8,28,0.8);
            box-shadow: 0 0 40px rgba(180,130,255,0.04), inset 0 0 40px rgba(180,130,255,0.02);
            transform: scale(1.005);
        }
        textarea::placeholder {
            color: #4a4a6a;
            font-size: 14px;
            line-height: 1.8;
        }
        .result-box {
            margin-top: 18px;
            background: rgba(10,8,28,0.4);
            border-radius: 24px;
            padding: 16px 20px;
            border: 1px solid rgba(180,130,255,0.06);
            cursor: pointer;
            min-height: 60px;
            transition: all 0.25s ease;
            animation: resultIn 0.4s ease-out;
        }
        .result-box:hover {
            border-color: rgba(180,130,255,0.12);
            background: rgba(10,8,28,0.6);
        }
        .result-box:active { transform: scale(0.97); }
        @keyframes resultIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .result-header .label { color: #a090c0; font-size: 13px; }
        .result-header .hint {
            color: #6a6a8a;
            font-size: 11px;
            animation: hintPulse 2s ease-in-out infinite;
        }
        @keyframes hintPulse {
            0%,100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .result-content {
            color: #f0ecff;
            font-size: 16px;
            line-height: 1.8;
            min-height: 28px;
            word-wrap: break-word;
            direction: ltr;
            text-align: left;
            transition: all 0.2s ease;
        }
        .result-content.empty { color: #4a4a6a; font-style: italic; }
        .result-content.error {
            color: #f8a0a0;
            animation: shake 0.4s ease-out;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            z-index: 999;
            animation: toastAnim 2.8s ease forwards;
            pointer-events: none;
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 12px 50px rgba(0,0,0,0.5);
        }
        @keyframes toastAnim {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.95); }
            12% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
            88% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px) scale(0.95); visibility: hidden; }
        }
        .toast-success { background: rgba(120,180,255,0.85); color: #fff; }
        .toast-error { background: rgba(255,120,120,0.85); color: #fff; }
        @media (max-width: 480px) {
            .glass-card { padding: 20px 16px 18px; border-radius: 32px; }
            .title-section h1 { font-size: 22px; }
            textarea { font-size: 15px; min-height: 100px; }
            .logo-text { font-size: 20px; }
        }
    </style>
</head>

    <script>
        // ==============================================
        // دیکشنری‌ها
        // ==============================================
        const letterMap = {
            'ا':'1','آ':'1','ب':'2','پ':'3','ت':'4','ث':'5',
            'ج':'6','چ':'7','ح':'8','خ':'9','د':'10','ذ':'11',
            'ر':'12','ز':'13','ژ':'14','س':'15','ش':'16','ص':'17',
            'ض':'18','ط':'19','ظ':'20','ع':'21','غ':'22','ف':'23',
            'ق':'24','ک':'25','گ':'26','ل':'27','م':'28','ن':'29',
            'و':'30','ه':'31','ی':'32'
        };

        // اعداد به یونانی (۰ و ۱ جدا)
        const numberToGreek = {
            '0': 'ο', '1': 'α', '2': 'β', '3': 'γ', '4': 'δ',
            '5': 'ε', '6': 'ϛ', '7': 'ζ', '8': 'η', '9': 'θ', '10': 'ι'
        };

        // معکوس یونانی به عدد
        const greekToNum = {
            'ο': '0', 'α': '1', 'β': '2', 'γ': '3', 'δ': '4',
            'ε': '5', 'ϛ': '6', 'ζ': '7', 'η': '8', 'θ': '9', 'ι': '10'
        };

        const numMap = {};
        for (let k in letterMap) {
            if (!numMap[letterMap[k]]) numMap[letterMap[k]] = k;
        }

        const inputBox = document.getElementById('inputBox');
        const outputDiv = document.getElementById('outputText');
        const resultBox = document.getElementById('resultBox');

        // ==============================================
        // تابع تشخیص نوع کاراکتر
        // ==============================================
        function isPersian(ch) {
            return /[ا-ی]/.test(ch);
        }

        function isDigit(ch) {
            return /[0-9]/.test(ch);
        }

        function isGreek(ch) {
            return /[α-ω]/.test(ch) || ch === 'ϛ';
        }

        // ==============================================
        // تبدیل به یونانی با قوانین جدید
        // ==============================================
        function encodeToGreek(text) {
            let lines = text.split('\n');
            let out = [];

            for (let line of lines) {
                let parts = [];
                let currentPart = [];
                let hasEnglish = false;

                for (let ch of line) {
                    if (/[a-zA-Z]/.test(ch)) {
                        hasEnglish = true;
                        break;
                    }

                    // اگر حرف فارسی بود
                    if (isPersian(ch)) {
                        currentPart.push(letterMap[ch] || ch);
                    }
                    // اگر عدد بود
                    else if (isDigit(ch)) {
                        // چک کن که قبلش حروف فارسی بوده یا نه
                        let lastIndex = currentPart.length - 1;
                        let prevChar = currentPart[lastIndex] || '';

                        // اگه قبلاً چیزی بود و عدد بود، یونانی کن
                        if (prevChar && isDigit(prevChar)) {
                            // اگه قبلاً عدد بود، یونانی کن
                            currentPart[lastIndex] = numberToGreek[prevChar] || prevChar;
                        }
                        currentPart.push(numberToGreek[ch] || ch);
                    }
                    // اگر فاصله بود
                    else if (ch === ' ' || ch === '\t') {
                        if (currentPart.length > 0) {
                            parts.push(currentPart.join(''));
                            currentPart = [];
                        }
                        parts.push('_');
                    }
                    // بقیه کاراکترها (علامت، ایموجی، ...)
                    else {
                        if (currentPart.length > 0) {
                            parts.push(currentPart.join(''));
                            currentPart = [];
                        }
                        parts.push(ch);
                    }
                }

                if (hasEnglish) {
                    return { error: true, msg: '❌ فقط متن فارسی مجاز است' };
                }

                if (currentPart.length > 0) {
                    parts.push(currentPart.join(''));
                }

                // تبدیل اعداد داخل کلمه به یونانی (اگه کنار حروف فارسی باشن)
                let result = '';
                let i = 0;
                while (i < parts.length) {
                    let part = parts[i];
                    // اگه part عددی بود و قسمت بعد یا قبل فارسی داشت
                    let isDigitPart = /^\d+$/.test(part);
                    let nextPart = parts[i + 1] || '';
                    let prevPart = parts[i - 1] || '';

                    if (isDigitPart && (isPersian(prevPart) || isPersian(nextPart))) {
                        // عدد رو به یونانی تبدیل کن
                        let greekPart = '';
                        for (let ch of part) {
                            greekPart += numberToGreek[ch] || ch;
                        }
                        result += greekPart;
                    } else {
                        result += part;
                    }
                    i++;
                }

                // نهایی‌سازی: اگه عدد تنها بود، عدد معمولی بمونه
                // ولی اگه کنار فارسی بود، یونانی بشه
                let finalResult = '';
                let tempParts = result.split('_');

                for (let part of tempParts) {
                    // اگه part فقط عدد بود و قبل/بعدش فارسی داشت، یونانی کن
                    if (/^\d+$/.test(part)) {
                        // چک کن که آیا توی کل خط فارسی وجود داره؟
                        let hasPersianInLine = /[ا-ی]/.test(line);
                        if (hasPersianInLine) {
                            let greekPart = '';
                            for (let ch of part) {
                                greekPart += numberToGreek[ch] || ch;
                            }
                            finalResult += greekPart;
                        } else {
                            finalResult += part;
                        }
                    } else {
                        finalResult += part;
                    }
                    finalResult += '_';
                }

                // حذف _ اضافه آخر
                if (finalResult.endsWith('_')) {
                    finalResult = finalResult.slice(0, -1);
                }

                // جایگزینی فاصله‌ها
                finalResult = finalResult.replace(/ /g, '_');

                out.push(finalResult);
            }

            return { error: false, result: out.join('\n') };
        }

        // ==============================================
        // تبدیل برعکس (یونانی و کد به فارسی)
        // ==============================================
        function decodeText(text) {
            let lines = text.split('\n');
            let out = [];

            for (let line of lines) {
                let segs = line.split('_');
                let words = [];
                let currentWord = '';

                for (let seg of segs) {
                    // اگه یونانی بود به عدد برگردون

                    for (let ch of seg) {
                        if (greekToNum[ch]) {

                        } else if (numMap[ch]) {

                        } else if (ch.match(/^\d+$/)) {
                            converted += ch;
                        } else {

                        }
                    }
                    words.push(converted);
                }

                out.push(words.join(' '));
            }

            return { error: false, result: out.join('\n') };
        }
