<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>زبان مخفی</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Noto Nastaliq Urdu', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
        }
        body {
            min-height: 100vh;
            background: #0b0b1e;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 540px;
            position: relative;
            z-index: 1;
        }
        .glass-card {
            background: rgba(18, 16, 40, 0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 40px;
            padding: 28px 22px 24px;
            border: 1px solid rgba(200, 160, 255, 0.12);
            box-shadow: 0 20px 70px rgba(0,0,0,0.6);
            animation: cardIn 0.6s ease-out;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 18px;
            margin-bottom: 18px;
            border-bottom: 1px solid rgba(200, 160, 255, 0.06);
        }
        .logo-text {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
        }
        .logo-text span {
            color: #c4b5fd;
        }
        .title-section {
            text-align: center;
            margin-bottom: 22px;
        }
        .title-section h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
        }
        .title-section .sub {
            color: #a78bfa;
            font-size: 14px;
            margin-top: 4px;
        }
        .input-label {
            color: #b0a0d0;
            font-size: 14px;
            margin-bottom: 8px;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            background: rgba(10, 8, 28, 0.6);
            border: 1px solid rgba(180, 130, 255, 0.12);
            border-radius: 24px;
            color: #f0ecff;
            font-size: 16px;
            padding: 14px 18px;
            resize: none;
            outline: none;
            line-height: 1.8;
            direction: rtl;
        }
        textarea:focus {
            border-color: rgba(180, 130, 255, 0.3);
            background: rgba(10, 8, 28, 0.8);
        }
        textarea::placeholder {
            color: #4a4a6a;
            font-size: 14px;
            line-height: 1.8;
        }
        .result-box {
            margin-top: 18px;
            background: rgba(10, 8, 28, 0.4);
            border-radius: 24px;
            padding: 16px 20px;
            border: 1px solid rgba(180, 130, 255, 0.06);
            cursor: pointer;
            min-height: 60px;
        }
        .result-box:active {
            transform: scale(0.97);
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .result-header .label {
            color: #a090c0;
            font-size: 13px;
        }
        .result-header .hint {
            color: #6a6a8a;
            font-size: 11px;
        }
        .result-content {
            color: #f0ecff;
            font-size: 16px;
            line-height: 1.8;
            min-height: 28px;
            word-wrap: break-word;
            direction: ltr;
            text-align: left;
        }
        .result-content.empty {
            color: #4a4a6a;
            font-style: italic;
        }
        .result-content.error {
            color: #f8a0a0;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            z-index: 999;
            animation: toastAnim 2.8s ease forwards;
            pointer-events: none;
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 12px 50px rgba(0,0,0,0.5);
        }
        @keyframes toastAnim {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            12% { opacity: 1; transform: translateX(-50%) translateY(0); }
            88% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); visibility: hidden; }
        }
        .toast-success { background: rgba(120, 180, 255, 0.85); color: #fff; }
        .toast-error { background: rgba(255, 120, 120, 0.85); color: #fff; }
        @media (max-width: 480px) {
            .glass-card { padding: 20px 16px 18px; border-radius: 32px; }
            .title-section h1 { font-size: 22px; }
            textarea { font-size: 15px; min-height: 100px; }
            .logo-text { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="header">
                <div class="logo-text">زبان <span>مخفی</span></div>
            </div>
            <div class="title-section">
                <h1>تبدیل خودکار</h1>
                <div class="sub">متن فارسی ⇄ کد مخفی</div>
            </div>
            <div class="input-label">📝 بنویس... (فقط فارسی)</div>
            <textarea id="inputBox" rows="3" placeholder="مثال:&#10;سلام خوبی 🥺&#10;یا&#10;15_27_1_28•9_30_2_32"></textarea>
            <div class="result-box" id="resultBox">
                <div class="result-header">
                    <div class="label">🔓 نتیجه</div>
                    <div class="hint">👆 کلیک برای کپی</div>
                </div>
                <div class="result-content empty" id="outputText">نتیجه اینجا نمایش داده می‌شود...</div>
            </div>
        </div>
    </div>
    <script>
        const letterMap = {
            'ا':'1','آ':'1','ب':'2','پ':'3','ت':'4','ث':'5',
            'ج':'6','چ':'7','ح':'8','خ':'9','د':'10','ذ':'11',
            'ر':'12','ز':'13','ژ':'14','س':'15','ش':'16','ص':'17',
            'ض':'18','ط':'19','ظ':'20','ع':'21','غ':'22','ف':'23',
            'ق':'24','ک':'25','گ':'26','ل':'27','م':'28','ن':'29',
            'و':'30','ه':'31','ی':'32'
        };
        const numMap = {};
        for (let k in letterMap) {
            if (!numMap[letterMap[k]]) numMap[letterMap[k]] = k;
        }
        const inputBox = document.getElementById('inputBox');
        const outputDiv = document.getElementById('outputText');
        const resultBox = document.getElementById('resultBox');

        function encodeText(text) {
            let lines = text.split('\n');
            let out = [];
            for (let line of lines) {
                let parts = [];
                let word = [];
                let hasEng = false;
                for (let ch of line) {
                    if (letterMap[ch]) {
                        word.push(letterMap[ch]);
                    } else if (ch === ' ' || ch === '\t') {
                        if (word.length) { parts.push(word.join('_')); word = []; }
                        parts.push('•');
                    } else if (/[a-zA-Z]/.test(ch)) {
                        hasEng = true; break;
                    } else if (/[0-9]/.test(ch)) {
                        word.push('d' + ch);
                    } else {
                        if (word.length) { parts.push(word.join('_')); word = []; }
                        parts.push(ch);
                    }
                }
                if (hasEng) return { error: true, msg: '❌ فقط متن فارسی مجاز است' };
                if (word.length) parts.push(word.join('_'));
                out.push(parts.join(''));
            }
            return { error: false, result: out.join('\n') };
        }

        function decodeText(text) {
            let lines = text.split('\n');
            let out = [];
            for (let line of lines) {
                let segs = line.split('•');
                let words = [];
                for (let seg of segs) {
                    let codes = seg.split('_');
                    let w = '';
                    for (let c of codes) {
                        if (c.startsWith('d') && c.slice(1).match(/^\d+$/)) {
                            w += c.slice(1);
                        } else if (numMap[c]) {
                            w += numMap[c];
                        } else if (c.match(/^\d+$/)) {
                            w += (numMap[c] || c);
                        } else {
                            w += c;
                        }
                    }
                    words.push(w);
                }
                out.push(words.join(' '));
            }
            return { error: false, result: out.join('\n') };
        }

        function autoConvert() {
            const raw = inputBox.value;
            if (!raw.trim()) {
                outputDiv.textContent = 'نتیجه اینجا نمایش داده می‌شود...';
                outputDiv.className = 'result-content empty';
                return;
            }
            if (/[a-zA-Z]/.test(raw)) {
                outputDiv.textContent = '❌ فقط متن فارسی مجاز است';
                outputDiv.className = 'result-content error';
                showToast('❌ فقط فارسی', 'error');
                return;
            }
            const hasDigits = /\d/.test(raw);
            const hasPersian = /[ا-ی]/.test(raw);
            let result;
            if (hasDigits && !hasPersian) {
                result = decodeText(raw);
            } else if (hasPersian) {
                result = encodeText(raw);
            } else {
                outputDiv.textContent = 'نتیجه اینجا نمایش داده می‌شود...';
                outputDiv.className = 'result-content empty';
                return;
            }
            if (result.error) {
                outputDiv.textContent = result.msg;
                outputDiv.className = 'result-content error';
                showToast(result.msg, 'error');
                return;
            }
            outputDiv.textContent = result.result;
            outputDiv.className = 'result-content';
        }

        function copyResult() {
            const txt = outputDiv.textContent;
            if (!txt || txt === 'نتیجه اینجا نمایش داده می‌شود...' || txt.includes('❌')) {
                showToast('⚠️ چیزی برای کپی نیست', 'error');
                return;
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(txt).then(() => {
                    showToast('✅ کپی شد', 'success');
                }).catch(() => fallbackCopy(txt));
            } else {
                fallbackCopy(txt);
            }
        }

        function fallbackCopy(text) {
            try {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.top = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('✅ کپی شد', 'success');
            } catch (_) {
                showToast('❌ کپی نشد', 'error');
            }
        }

        function showToast(msg, type = 'success') {
            const old = document.querySelector('.toast');
            if (old) old.remove();
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2800);
        }

        let debounceTimer;
        inputBox.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(autoConvert, 200);
        });
        resultBox.addEventListener('click', copyResult);
        outputDiv.textContent = 'نتیجه اینجا نمایش داده می‌شود...';
        outputDiv.className = 'result-content empty';
    </script>
</body>
</html>
